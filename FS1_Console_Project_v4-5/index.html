<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FS-1 Heavy Industrial Console v4.5</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>

    <div class="cockpit-panel">
        <!-- HEADER IMAGE - Expected in assets/images/ui/ -->
        <img src="assets/images/ui/Seaview and Flying Sub.png" class="panel-banner" alt="FS-1 Mission Status">

        <input type="checkbox" id="pwr-sw">
        <input type="checkbox" id="pre-sw">
        <input type="checkbox" id="reac-sw">
        <input type="checkbox" id="int-sw">
        <input type="checkbox" id="fld-sw">

        <div class="jewel-light"></div>

        <div class="inner-panel">
            <div class="control-item">
                <button class="push-btn" id="link-btn" onclick="connectBLE()"></button>
                <span class="dymo">LINK SYS</span>
            </div>

            <div class="control-item">
                <label for="pwr-sw" class="toggle-label green-toggle"></label>
                <span class="dymo">MASTER PWR</span>
            </div>

            <div class="control-item">
                <label for="pre-sw" class="toggle-label red-toggle"></label>
                <span class="dymo">PREHEAT</span>
            </div>

            <div class="throttle-container">
                <input type="range" class="vertical-slider" min="0" max="100" value="0" id="thrust-slider">
                <span class="dymo" style="margin-top: 55px;">THRUST</span>
            </div>

            <div class="control-item">
                <label for="reac-sw" class="toggle-label red-toggle"></label>
                <span class="dymo">REACTOR</span>
            </div>

            <div class="control-item">
                <label for="int-sw" class="toggle-label red-toggle"></label>
                <span class="dymo">INTERIOR</span>
            </div>
            
            <div class="control-item">
                <label for="fld-sw" class="toggle-label red-toggle"></label>
                <span class="dymo">FLOODS</span>
            </div>
        </div>

        <div class="power-section" style="width:90%; margin-top:20px; text-align:center;">
            <span class="dymo">REACTOR THERMAL OUTPUT</span>
            <div class="power-bar-container">
                <div class="power-fill" id="p-level"></div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/effects.js"></script>
</body>
</html>
